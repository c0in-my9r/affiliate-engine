<!DOCTYPE html>
<html lang="en">
<head><script src="/livereload.js?mindelay=10&amp;v=2&amp;port=1313&amp;path=livereload" data-no-instant defer></script>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Categories | Affiliate Engine</title>
  <meta name="description" content="">
  <style>
    :root {
      --bg: #0b1020;
      --panel: #121933;
      --panel-2: #182142;
      --text: #e8ecf8;
      --muted: #aab4d6;
      --line: #2a376b;
      --accent: #7aa2ff;
      --accent-2: #9bffd0;
      --max: 1080px;
      --radius: 18px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(180deg, #0b1020 0%, #0d1327 100%);
      color: var(--text);
      line-height: 1.6;
    }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }
    .wrap { width: min(var(--max), calc(100% - 32px)); margin: 0 auto; }
    .site-header {
      border-bottom: 1px solid var(--line);
      background: rgba(11,16,32,.85);
      backdrop-filter: blur(8px);
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .site-header .wrap {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 0;
    }
    .brand {
      font-weight: 700;
      font-size: 1.05rem;
      color: var(--text);
    }
    .nav a {
      margin-left: 16px;
      color: var(--muted);
    }
    .hero {
      padding: 56px 0 24px;
    }
    .hero-card, .panel {
      background: linear-gradient(180deg, var(--panel) 0%, var(--panel-2) 100%);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: 0 10px 30px rgba(0,0,0,.25);
    }
    .hero-card {
      padding: 32px;
    }
    .eyebrow {
      display: inline-block;
      font-size: .8rem;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--accent-2);
      margin-bottom: 10px;
    }
    h1, h2, h3 {
      line-height: 1.15;
      margin-top: 0;
    }
    h1 { font-size: clamp(2rem, 4vw, 3.2rem); margin-bottom: 12px; }
    h2 { font-size: 1.45rem; margin-bottom: 12px; }
    p.lead {
      color: var(--muted);
      font-size: 1.08rem;
      max-width: 760px;
    }
    .cta-row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 20px;
    }
    .btn {
      display: inline-block;
      padding: 12px 16px;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: #1a2449;
      color: var(--text);
      font-weight: 700;
    }
    .btn.primary {
      background: var(--accent);
      color: #09101f;
      border-color: transparent;
    }
    .main {
      padding: 12px 0 56px;
    }
    .grid {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 24px;
    }
    .content, .sidebar {
      min-width: 0;
    }
    .panel {
      padding: 24px;
      margin-bottom: 20px;
    }
    .panel ul {
      margin: 0;
      padding-left: 20px;
    }
    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 16px;
    }
    .mini-card {
      padding: 18px;
      border-radius: 14px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,.02);
    }
    .muted { color: var(--muted); }
    .site-footer {
      border-top: 1px solid var(--line);
      color: var(--muted);
      padding: 28px 0 40px;
    }
    .content p, .content li { color: #dce4ff; }
    .content h2 { margin-top: 28px; }
    .tag {
      display: inline-block;
      padding: 6px 10px;
      border: 1px solid var(--line);
      border-radius: 999px;
      color: var(--muted);
      font-size: .85rem;
      margin: 4px 6px 0 0;
    }
    @media (max-width: 860px) {
      .grid { grid-template-columns: 1fr; }
      .site-header .wrap { flex-direction: column; gap: 10px; align-items: flex-start; }
      .nav a { margin-left: 0; margin-right: 14px; }
    }
  </style>
</head>
<body>
  <header class="site-header">
    <div class="wrap">
      <a class="brand" href="/">Affiliate Engine</a>
      <nav class="nav">
        <a href="/">Home</a>
        <a href="/tools/">Tool Guides</a>
      </nav>
    </div>
  </header>

  
<section class="hero">
  <div class="wrap">
    <div class="hero-card">
      <div class="eyebrow">Browse</div>
      <h1>Categories</h1>
      <p class="lead">Explore AI tool pages grouped by practical use case. This library is being expanded from starter guides into full comparison pages.</p>
    </div>
  </div>
</section>

<section class="main">
  <div class="wrap">
    <div class="panel">
      <div class="card-grid">
        
      </div>
    </div>
  </div>
</section>


  <footer class="site-footer">
    <div class="wrap">
      <div>AI tool discovery guides built for practical comparison, fast browsing, and future affiliate monetization.</div>
    </div>
  </footer>
</body>
</html>
